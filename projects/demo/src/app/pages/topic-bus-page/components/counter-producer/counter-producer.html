<div class="card producer">
  <span class="label">Producer Component</span>
  <h2>Child I</h2>
  <div class="counter">{{ counter }}</div>

  <div class="actions">
    <button (click)="increment()">Increment</button>
    <button class="danger" (click)="decrement()">Decrement</button>
  </div>

  <p>Publishes updates to topic: <b>counter</b></p>
</div>
