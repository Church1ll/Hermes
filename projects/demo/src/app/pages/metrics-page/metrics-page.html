<section>
  <div class="header">
    <span>Feature 06</span>
    <h1>Runtime Metrics</h1>
    <p>
      This page displays basic runtime information exposed by the library. If metrics are enabled in
      your implementation, they can be used for debugging and presentation.
    </p>
  </div>

  <div class="grid">
    @for (item of metricItems; track item.label) {
      <div class="card">
        <span>{{ item.label }}</span>
        <strong>{{ item.value }}</strong>
      </div>
    }
  </div>

  <button (click)="refresh()">Refresh metrics</button>
</section>
